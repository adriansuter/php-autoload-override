name: Lowest Dependencies

on:
  push:
  pull_request:

jobs:
  lowest:
    name: Lowest deps (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ 8.2, 8.3 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: lowest-composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            lowest-composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install lowest dependencies
        run: composer update --prefer-lowest --prefer-stable --no-interaction --no-progress

      - name: Validate composer.json
        run: composer validate --strict

      - name: Coding standards
        run: vendor/bin/phpcs

      - name: Static analysis
        run: vendor/bin/phpstan analyse src --memory-limit=-1

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage
